<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>昔涟 · 语音通话</title>
  <link rel="stylesheet" href="../ui/tokens.css" />
  <link rel="stylesheet" href="../ui/fonts.css" />
  <link rel="stylesheet" href="../ui/base.css" />
  <link rel="stylesheet" href="./call.css" />
</head>
<body>
  <div class="call">
    <canvas class="call__particles" id="particles" aria-hidden="true"></canvas>
    <div class="call__body">
      <!-- 自定义标题栏 -->
      <header class="call__titlebar">
        <span class="call__title">语音通话</span>
        <button type="button" class="call__close" id="close-btn" title="挂断">✕</button>
      </header>

      <!-- 状态文字 -->
      <div class="call__status" id="call-status">正在连接...</div>

      <!-- 头衔区：昔涟名字 + 在线指示 -->
      <div class="call__identity">
        <span class="call__name">昔涟</span>
        <span class="call__presence" aria-hidden="true"></span>
      </div>

      <!-- 通话时长（接通后开始计时，hangup 后停止；display 控制可见性） -->
      <div class="call__duration" id="call-duration" hidden>00:00</div>

      <!-- 头像 + 电波环 + 音量波形（同一区域） -->
      <div class="call__avatar-zone" id="avatar-zone">
        <div class="call__avatar-ring" id="avatar-ring">
          <span></span>
        </div>
        <canvas class="call__waveform" id="waveform-canvas"></canvas>
        <img class="call__avatar" src="/avatars/cyrene-avatar.png" alt="昔涟" draggable="false" />
      </div>

      <!-- 转写区（可关闭，只显示当前一轮） -->
      <div class="call__transcript" id="transcript" hidden></div>

      <!-- 底部：柱状胶囊波形 + 挂断键 -->
      <div class="call__actions">
        <div class="call__mic-wave" id="mic-wave">
          <div class="call__mic-wave-bar"></div>
          <div class="call__mic-wave-bar"></div>
          <div class="call__mic-wave-bar"></div>
          <div class="call__mic-wave-bar"></div>
        </div>
        <button class="call__hangup" id="hangup-btn" title="挂断">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 9c-1.6 0-3.15.25-4.6.72v3.1c0 .39-.23.74-.56.9-.98.49-1.87 1.12-2.66 1.85-.18.18-.43.28-.7.28-.28 0-.53-.11-.71-.29L.29 13.08a.965.965 0 0 1-.29-.7c0-.28.11-.53.29-.71C3.34 8.78 7.46 7 12 7s8.66 1.78 11.7 4.67c.18.18.29.43.29.71 0 .28-.11.53-.29.71l-2.48 2.48a.965.965 0 0 1-.71.29c-.27 0-.52-.1-.7-.28a11.27 11.27 0 0 0-2.67-1.85.996.996 0 0 1-.56-.9v-3.1C15.15 9.25 13.6 9 12 9z"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
