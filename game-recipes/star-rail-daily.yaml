name: 星穹铁道每日
exe: "${exe_path}"
model: "${vlm_config}"
# vlm_* 原语默认截图前 settle 3s 等界面稳定，可单步覆盖

steps:
  # 1. 启动
  - launch: "${exe}"

  # 2. 等加载 + 判断更新弹窗
  - wait: 60s
  - vlm_check:
      id: has_update
      ask: "画面上是否出现了游戏版本更新/下载弹窗？"
  - branch:
      if: "${has_update}"
      then:
        - vlm_click: { ref: download_btn }
        - wait: 330s
        - vlm_click: { ref: restart_btn }
        - wait: 90s
        - click: center
        - wait: 6s
        - click: center
      else:
        - click: center
        - wait: 6s
        - click: center

  # 3. 进主界面 + 领月卡（有则领，无则正常走完两步）
  - wait: 90s
  - click: center
  - wait: 10s
  - click: center

  # 4-5. 开 F3 面板
  - key: F3
  - wait: 6s

  # 6-7. 两轮识图推进
  - vlm_click: { ref: f3_target_1 }
  - vlm_click: { ref: f3_target_2 }

  # 8. 加号×3 + 开始挑战（加号位置不变，识别一次连点 3 次）
  - vlm_click: { ref: plus_btn, repeat: 3, interval: 1s }
  - vlm_click: { ref: start_challenge_1 }

  # 9. 角色选择
  - vlm_click: { ref: support_btn }            # 9-1 支援按钮
  - vlm_select: "支援列表里的第一个角色"        # 9-2 选第一个（布局固定内容变，无参考图）
  - vlm_click: { ref: confirm_btn }            # 9-3 确认
  - vlm_click: { ref: start_challenge_2 }      # 9-4 开始挑战
  - key: V                                     # 进战斗

  # 10. 自动战斗状态比对（当前图 + 开/关两张参考图；refs[0]=开启 [1]=关闭）
  - vlm_compare:
      id: auto_battle_state
      ask: "当前自动战斗是开启还是关闭？参考图1=开启，参考图2=关闭，当前画面匹配哪个？"
      refs: [auto_battle_on, auto_battle_off]
  - branch:
      if: "${auto_battle_state == 1}"          # 关闭 → 按 V 开启
      then:
        - key: V

  # 11. 等战斗结束 + 退出副本（5 分钟够）
  - wait: 300s
  - vlm_click: { ref: exit_dungeon_btn }

  # 12. 返回 + 重开 F3
  - wait: 10s
  - key: Escape
  - wait: 6s
  - key: F3

  # 13. 领取奖励
  - vlm_click: { ref: claim_btn, repeat: 3, interval: 2s }   # 13-1 连点×3
  - vlm_check:                                              # 13-2 500 档位是否高亮
      id: tier_highlighted
      ask: "画面上方的 500 档位按钮是否处于高亮可领取状态？参考图是高亮时的样子。"
      ref: tier_500_highlight
  - branch:                                                 # 13-3 高亮则点
      if: "${tier_highlighted}"
      then:
        - vlm_click: { ref: tier_500_btn }

  # 13-4. 退出游戏
  - key: "Alt+F4"
